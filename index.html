<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Health Agent">
<meta name="theme-color" content="#0d0c0a">
<title>Health Agent</title>
<style>
:root {
  --bg:#0d0c0a; --card:#17150f; --card2:#1d1a13; --line:#2a261c;
  --txt:#f4f1ea; --mut:#8d877a; --gold:#d4a843; --orange:#e06c3a;
  --blue:#5aa9e6; --green:#5cb87a; --red:#e05a5a; --purple:#b08fe0;
  --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { background:var(--bg); color:var(--txt); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif; }
body { padding:calc(var(--safe-top) + 10px) 16px calc(var(--safe-bot) + 90px); max-width:640px; margin:0 auto; }
.eyebrow { font-size:11px; letter-spacing:3px; font-weight:700; color:var(--gold); text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
.eyebrow .date { color:var(--mut); letter-spacing:1px; border:1px solid var(--line); border-radius:99px; padding:4px 12px; font-size:11px; }
h1.big { font-size:54px; line-height:.95; font-weight:850; letter-spacing:-1px; text-transform:uppercase; margin:10px 0 2px; }
h1.big .accent { display:block; }
.subtitle { font-size:13px; letter-spacing:2.5px; color:var(--mut); text-transform:uppercase; margin:8px 0 16px; }
.chips { display:flex; gap:6px; overflow-x:auto; padding:4px 0 12px; -webkit-overflow-scrolling:touch; }
.chip { flex:none; font-size:12px; font-weight:700; letter-spacing:1px; color:var(--mut); border:1px solid var(--line); border-radius:99px; padding:9px 16px; background:transparent; }
.chip.today { color:var(--txt); }
.chip.today::after { content:" •"; color:var(--gold); }
.chip.sel { border-color:var(--acc,var(--gold)); color:var(--acc,var(--gold)); }
.meta { display:flex; justify-content:space-between; font-size:11.5px; letter-spacing:1.5px; color:var(--mut); text-transform:uppercase; border-bottom:2px solid var(--line); padding-bottom:8px; margin-bottom:14px; }
.meta b { color:var(--txt); }
.card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:12px; }
.exhead { display:flex; justify-content:space-between; align-items:baseline; gap:10px; }
.exname { font-size:17px; font-weight:700; }
.extarget { font-size:14px; font-weight:800; color:var(--acc,var(--gold)); white-space:nowrap; }
.excue { font-size:12.5px; color:var(--mut); font-style:italic; margin-top:3px; }
.setgrid { margin-top:12px; }
.setlabels { display:grid; grid-template-columns:40px 1fr 1fr 44px; gap:8px; font-size:10px; color:var(--mut); text-transform:uppercase; letter-spacing:1px; text-align:center; margin-bottom:6px; }
.setrow { display:grid; grid-template-columns:40px 1fr 1fr 44px; gap:8px; align-items:center; margin-bottom:7px; }
.setnum { width:36px; height:36px; border:1.5px solid var(--line); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--mut); }
.setrow.done .setnum { background:var(--acc,var(--gold)); border-color:var(--acc,var(--gold)); color:#0d0c0a; }
.setrow input { font:inherit; font-size:16px; font-weight:600; text-align:center; background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:11px; padding:9px 4px; width:100%; }
.setrow input:focus { outline:none; border-color:var(--acc,var(--gold)); }
.setrow.done input { opacity:.65; }
.checkbtn { width:40px; height:40px; border-radius:12px; border:1.5px solid var(--line); background:var(--card2); color:var(--mut); font-size:17px; }
.setrow.done .checkbtn { background:var(--acc,var(--gold)); border-color:var(--acc,var(--gold)); color:#0d0c0a; }
.exfoot { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
.rpewrap { font-size:12px; color:var(--mut); display:flex; align-items:center; gap:6px; }
select,.noteinput,textarea.f { font:inherit; font-size:13px; background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:10px; padding:7px 10px; }
.noteinput { flex:1; min-width:110px; }
.restpill { font-size:11px; letter-spacing:1px; color:var(--mut); border:1px solid var(--line); border-radius:99px; padding:5px 12px; text-transform:uppercase; }
.restpill.ext { color:var(--orange); border-color:#4a3220; }
.bigbtn { display:block; width:100%; font:inherit; font-size:16px; font-weight:800; letter-spacing:.5px; color:#0d0c0a; background:var(--gold); border:none; border-radius:16px; padding:16px; margin:18px 0 6px; }
.bigbtn:disabled { background:#3a362b; color:#7a7466; }
.bigbtn.ghost { background:transparent; border:1px solid var(--line); color:var(--mut); font-weight:600; padding:12px; font-size:13px; margin:6px 0; }
.status { text-align:center; font-size:12px; color:var(--mut); min-height:16px; margin-top:6px; }
.restcard { text-align:center; padding:60px 16px; }
.restcard .emoji { font-size:44px; }
.restcard h2 { font-size:30px; letter-spacing:2px; color:var(--mut); margin:14px 0 6px; text-transform:uppercase; }
.tip { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 15px; font-size:13.5px; line-height:1.5; margin-bottom:10px; text-align:left; color:var(--txt); }
.tip b { color:var(--gold); }
.hrow { display:flex; justify-content:space-between; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; align-items:baseline; }
.hrow:last-child { border:none; }
.hrow .nm { font-weight:650; }
.hrow .det { color:var(--mut); font-size:12.5px; white-space:nowrap; }
.hnote { font-size:11.5px; color:var(--orange); margin-top:2px; }
#timerbar { position:fixed; left:0; right:0; bottom:0; background:rgba(13,12,10,.96); backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:10px 16px calc(var(--safe-bot) + 10px); display:none; z-index:50; }
#timerbar.on { display:block; }
.timerrow { max-width:640px; margin:0 auto; display:flex; align-items:center; gap:12px; }
#timenum { font-size:34px; font-weight:850; font-variant-numeric:tabular-nums; min-width:96px; }
#timenum.urgent { color:var(--orange); }
.timerlabel { flex:1; font-size:11px; letter-spacing:1.5px; color:var(--mut); text-transform:uppercase; line-height:1.5; }
.tbtn { font:inherit; font-size:13px; font-weight:700; background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:11px; padding:10px 14px; }
#timerprog { position:absolute; top:-1px; left:0; height:2px; background:var(--gold); width:0%; }
#tabs { position:fixed; left:0; right:0; bottom:0; background:rgba(13,12,10,.96); backdrop-filter:blur(10px); border-top:1px solid var(--line); display:flex; z-index:40; padding-bottom:var(--safe-bot); }
#tabs button { flex:1; font:inherit; font-size:10px; letter-spacing:.8px; font-weight:700; text-transform:uppercase; color:var(--mut); background:none; border:none; padding:13px 0 10px; }
#tabs button.sel { color:var(--gold); }
.verdict { text-align:center; padding:20px 16px; }
.verdict .v { font-size:28px; font-weight:850; letter-spacing:.5px; text-transform:uppercase; }
.v.green { color:var(--green); } .v.yellow { color:var(--gold); } .v.red { color:var(--red); } .v.stale { color:var(--mut); }
.verdict .adv { font-size:13px; color:var(--mut); margin-top:7px; line-height:1.5; }
.sigs { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-top:11px; }
.sig { font-size:11.5px; padding:5px 11px; border-radius:99px; border:1px solid var(--line); color:var(--mut); }
.sig.s0 { color:var(--green); border-color:#2c4a36; } .sig.s1 { color:var(--gold); border-color:#4a3f1d; } .sig.s2 { color:var(--red); border-color:#4a2424; }
h3.sec { font-size:11px; letter-spacing:2px; color:var(--mut); text-transform:uppercase; margin:18px 0 8px; }
.togglerow { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
.tg { font-size:11.5px; font-weight:700; letter-spacing:.5px; border:1.5px solid var(--line); color:var(--mut); border-radius:99px; padding:7px 13px; background:transparent; }
.tg.on { color:#0d0c0a; border-color:transparent; }
.tg.on.c-rhr { background:var(--red); } .tg.on.c-hrv { background:var(--blue); }
.tg.on.c-slp { background:var(--purple); } .tg.on.c-st { background:#9a9384; } .tg.on.c-wt { background:var(--gold); }
.rangerow { display:flex; gap:6px; margin-bottom:10px; }
.rg { flex:1; font-size:12px; font-weight:700; border:1px solid var(--line); color:var(--mut); border-radius:10px; padding:8px 0; background:transparent; text-align:center; }
.rg.on { color:var(--gold); border-color:var(--gold); }
#chart { width:100%; height:230px; display:block; touch-action:pan-y; }
#scrub { min-height:20px; font-size:12.5px; color:var(--mut); text-align:center; margin-bottom:4px; font-variant-numeric:tabular-nums; }
#scrub b { color:var(--txt); }
.legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; font-size:11.5px; color:var(--mut); }
.legend b { color:var(--txt); }
.dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:4px; vertical-align:1px; }
.statrow { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.stat { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; text-align:center; }
.stat .num { font-size:26px; font-weight:850; }
.stat .lbl { font-size:10.5px; letter-spacing:1.5px; color:var(--mut); text-transform:uppercase; margin-top:3px; }
.wkbars { display:flex; gap:8px; align-items:flex-end; height:110px; padding-top:6px; }
.wkbar { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
.wkbar .bar { width:100%; max-width:42px; border-radius:7px 7px 3px 3px; background:var(--gold); opacity:.9; }
.wkbar.dim .bar { background:var(--card2); border:1px solid var(--line); }
.wkbar .lb { font-size:9.5px; color:var(--mut); letter-spacing:.3px; }
.wkbar .val { font-size:10px; color:var(--txt); font-weight:700; }
.cal { display:grid; grid-template-columns:repeat(7,1fr); gap:6px; }
.cal .hd { text-align:center; font-size:9.5px; color:var(--mut); letter-spacing:1px; }
.cal .c { aspect-ratio:1; border-radius:8px; background:var(--card2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:9px; color:transparent; }
.cal .c.green { background:#234a31; border-color:#2c5a3b; } .cal .c.greenish { background:#2c4a2a44; border-color:#2c4a36; }
.cal .c.yellow { background:#4a3f1d; border-color:#5a4d24; } .cal .c.red { background:#4a2424; border-color:#5a2c2c; }
.cal .c.today { outline:2px solid var(--gold); color:var(--gold); font-weight:800; }
.callegend { display:flex; gap:12px; justify-content:center; font-size:10.5px; color:var(--mut); margin-top:10px; }
.sleepbars { display:flex; gap:8px; align-items:flex-end; height:80px; margin-top:10px; }
.slb { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; height:100%; justify-content:flex-end; }
.slb .bar { width:100%; max-width:36px; border-radius:6px 6px 2px 2px; }
.slb .lb { font-size:9px; color:var(--mut); }
.slb .v { font-size:9.5px; color:var(--txt); font-weight:700; }
.progbox { max-height:250px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.bumps .row { display:flex; justify-content:space-between; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:13.5px; }
.bumps .row:last-child { border:none; }
.bumps .st { font-weight:800; white-space:nowrap; }
.st.bump { color:var(--green); } .st.work { color:var(--blue); } .st.wait { color:var(--mut); }
.scrollhint { text-align:center; font-size:10px; color:var(--mut); letter-spacing:1px; margin-top:6px; }
/* lifts tab */
.liftrow { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:12px 0; border-bottom:1px solid var(--line); }
.liftrow:last-child { border:none; }
.liftrow .nm { font-weight:700; font-size:15px; }
.liftrow .sub { font-size:11.5px; color:var(--mut); margin-top:2px; }
.liftrow .arrow { color:var(--mut); font-size:18px; }
.backbtn { font:inherit; font-size:13px; font-weight:700; color:var(--gold); background:none; border:none; padding:6px 0 12px; letter-spacing:1px; }
#liftchart { width:100%; height:150px; display:block; }
/* coach */
.recap { font-size:14px; line-height:1.65; }
.recap p { margin-bottom:10px; }
.recap b { color:var(--gold); }
.msgbox { width:100%; min-height:90px; resize:vertical; margin-bottom:8px; border-radius:12px; }
.msgqueued { font-size:12px; color:var(--orange); padding:6px 0; }
/* plan */
.phase { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); align-items:baseline; }
.phase:last-child { border:none; }
.phase .wk { font-size:11px; font-weight:800; color:var(--mut); min-width:58px; letter-spacing:.5px; }
.phase .nm { font-weight:700; font-size:14px; }
.phase .nt { font-size:12px; color:var(--mut); margin-top:2px; }
.phase.cur { background:linear-gradient(90deg,#d4a84311,transparent); border-radius:8px; margin:0 -8px; padding:10px 8px; }
.phase.cur .wk { color:var(--gold); }
.sessacc { border-bottom:1px solid var(--line); }
.sessacc:last-child { border:none; }
.sessacc .head { display:flex; justify-content:space-between; align-items:center; padding:13px 0; font-weight:800; font-size:15px; }
.sessacc .head .day { font-size:11px; color:var(--mut); letter-spacing:1px; font-weight:700; }
.sessacc .body { display:none; padding-bottom:12px; }
.sessacc.open .body { display:block; }
.pexrow { padding:8px 0; border-top:1px solid #221f17; font-size:13.5px; }
.pexrow .tg2 { color:var(--mut); font-size:12px; }
.mnote { font-size:11.5px; color:var(--blue); margin-top:3px; line-height:1.45; }
label.f { display:block; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--mut); margin:14px 0 6px; }
input.f { width:100%; font:inherit; font-size:14px; background:var(--card2); color:var(--txt); border:1px solid var(--line); border-radius:12px; padding:12px; }
.queuebadge { font-size:11px; color:var(--orange); }
</style>
</head>
<body>
<div id="view"></div>

<div id="timerbar"><div id="timerprog"></div>
  <div class="timerrow">
    <div id="timenum">0:00</div>
    <div class="timerlabel" id="timerlabel">REST</div>
    <button class="tbtn" id="t30">+30s</button>
    <button class="tbtn" id="tskip">Skip</button>
  </div>
</div>

<div id="tabs">
  <button data-tab="today" class="sel">Today</button>
  <button data-tab="dash">Dash</button>
  <button data-tab="lifts">Lifts</button>
  <button data-tab="coach">Coach</button>
  <button data-tab="plan">Plan</button>
  <button data-tab="settings">Setup</button>
</div>

<script>
'use strict';
/* Health Agent phone app v3 — adds: chart scrubber + single-metric y-axis,
   tonnage trend, green-day calendar, sleep debt, Lifts/Coach/Plan tabs,
   coach messaging via inbox.json. */

const LS = {
  get k() { return JSON.parse(localStorage.getItem('ha_settings') || '{}'); },
  set k(v) { localStorage.setItem('ha_settings', JSON.stringify(v)); }
};
const store = {
  get appdata() { return JSON.parse(localStorage.getItem('ha_appdata') || 'null'); },
  set appdata(v) { localStorage.setItem('ha_appdata', JSON.stringify(v)); },
  get queue() { return JSON.parse(localStorage.getItem('ha_queue') || '[]'); },
  set queue(v) { localStorage.setItem('ha_queue', JSON.stringify(v)); },
  get msgq() { return JSON.parse(localStorage.getItem('ha_msgq') || '[]'); },
  set msgq(v) { localStorage.setItem('ha_msgq', JSON.stringify(v)); },
  draft(date) { return JSON.parse(localStorage.getItem('ha_draft_' + date) || 'null'); },
  setDraft(date, v) { localStorage.setItem('ha_draft_' + date, JSON.stringify(v)); },
};

const WEEKDAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ACCENTS = { 'Push A':'#d4a843','Push B':'#d4a843','Pull A':'#cfc9bd','Pull B':'#cfc9bd',
                  'Legs A':'#e06c3a','Legs B':'#e06c3a','REST':'#5cb87a' };
const METRICS = [
  { id:'rhr', label:'RHR', color:'#e05a5a', unit:'bpm' },
  { id:'hrv', label:'HRV', color:'#5aa9e6', unit:'ms' },
  { id:'slp', label:'SLEEP', color:'#b08fe0', unit:'h' },
  { id:'st',  label:'STEPS', color:'#9a9384', unit:'' },
  { id:'wt',  label:'WEIGHT', color:'#d4a843', unit:'lb' },
];
let tab = 'today';
let selDate = isoToday();
let selLift = null;
let range = +(localStorage.getItem('ha_range') || 30);
let metricState = JSON.parse(localStorage.getItem('ha_metrics') || 'null') || { rhr:true, hrv:true, slp:false, st:false, wt:false };
let scrubIdx = null, chartRows = [];

function isoToday() { return new Date().toISOString().slice(0,10); }
function weekdayOf(iso) { return WEEKDAYS[(new Date(iso + 'T12:00:00').getDay() + 6) % 7]; }
function mondayOf(iso) { const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate() - ((d.getDay() + 6) % 7)); return d.toISOString().slice(0,10); }
function addDays(iso, n) { const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate() + n); return d.toISOString().slice(0,10); }
function fmtDate(iso) { return new Date(iso + 'T12:00:00').toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'}).toUpperCase(); }
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function norm(s) { return String(s).replace(/\(.*?\)/g,'').toLowerCase().replace(/[^a-z]/g,''); }
const $ = id => document.getElementById(id);

/* ---------------- gist sync ---------------- */
async function gistGet() {
  const s = LS.k;
  if (!s.token || !s.gist) throw new Error('Not configured — open Setup');
  const r = await fetch('https://api.github.com/gists/' + s.gist,
    { headers: { Authorization: 'Bearer ' + s.token, Accept: 'application/vnd.github+json' } });
  if (!r.ok) throw new Error('GitHub ' + r.status);
  return r.json();
}
async function gistPatch(files) {
  const s = LS.k;
  const r = await fetch('https://api.github.com/gists/' + s.gist, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + s.token, Accept: 'application/vnd.github+json' },
    body: JSON.stringify({ files })
  });
  if (!r.ok) throw new Error('GitHub ' + r.status);
  return r.json();
}
async function pullAppdata() {
  const g = await gistGet();
  const f = g.files['appdata.json'];
  if (!f) throw new Error('appdata.json missing in gist');
  const content = f.truncated ? await (await fetch(f.raw_url)).text() : f.content;
  store.appdata = JSON.parse(content);
  return store.appdata;
}
async function pushQueue() {
  const q = store.queue, mq = store.msgq;
  if (!q.length && !mq.length) return 0;
  const g = await gistGet();
  let inbox = { sessions: [], messages: [] };
  try { inbox = JSON.parse(g.files['inbox.json'] ? g.files['inbox.json'].content : '{}'); } catch (e) {}
  inbox.sessions = inbox.sessions || []; inbox.messages = inbox.messages || [];
  const have = new Set(inbox.sessions.map(s => s.id));
  for (const s of q) if (!have.has(s.id)) inbox.sessions.push(s);
  const haveM = new Set(inbox.messages.map(m => m.id));
  for (const m of mq) if (!haveM.has(m.id)) inbox.messages.push(m);
  await gistPatch({ 'inbox.json': { content: JSON.stringify(inbox, null, 1) } });
  const n = q.length + mq.length;
  store.queue = []; store.msgq = [];
  return n;
}
async function syncAll(statusEl) {
  const say = m => { if (statusEl) statusEl.textContent = m; };
  try {
    say('Syncing…');
    const n = await pushQueue();
    await pullAppdata();
    say((n ? 'Sent ' + n + ' item(s). ' : '') + 'Up to date ✓');
    render();
  } catch (e) { say('Offline / ' + e.message + (store.queue.length + store.msgq.length ? ' — ' + (store.queue.length + store.msgq.length) + ' queued' : '')); }
}

/* ---------------- timer ---------------- */
let timer = { end:0, total:0, iv:null, ei:null, si:null, date:null };
function startTimer(sec, label, date, ei, si) {
  clearInterval(timer.iv);
  timer = { end: Date.now() + sec * 1000, total: sec * 1000, iv: setInterval(tickTimer, 200), ei, si, date };
  $('timerlabel').textContent = label || 'REST';
  $('timerbar').classList.add('on');
  tickTimer();
}
function tickTimer() {
  const left = timer.end - Date.now();
  if (left <= 0) {
    $('timenum').textContent = 'GO!';
    $('timenum').classList.add('urgent');
    $('timerprog').style.width = '100%';
    beep();
    clearInterval(timer.iv);
    setTimeout(() => $('timerbar').classList.remove('on'), 2500);
    return;
  }
  const s = Math.ceil(left / 1000);
  $('timenum').textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');

let audioCtx = null;
function beep() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    [0, .18, .36].forEach(t => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = 880; g.gain.value = .25;
      o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + .12);
    });
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate([200, 80, 200]);
}

function restExtNote(ex) {
  const e = ex.rest_ext || {};
  const sets = Object.keys(e).sort();

  const total = sets.reduce((a, k) => a + e[k], 0);

function getDraft(date, sessName, sess) {
  let d = store.draft(date);
  if (d && d.session === sessName) return d;
  d = { date, session: sessName, exercises: sess.exercises.map(ex => ({
    name: ex.name, equip: ex.type, rest: ex.rest_sec, rpe: '', note: '', rest_ext: {},
    sets: Array.from({ length: ex.sets }, () => ({ reps: '', weight: ex.prefill_weight ?? '', done: false }))
  })) };
  store.setDraft(date, d);
  return d;
}

/* ---------------- DASH ---------------- */
function fmtV(id, val) {
  if (val == null) return '—';
  if (id === 'st') return (val / 1000).toFixed(1) + 'k';
  if (id === 'slp') return val.toFixed(1) + 'h';
  if (id === 'wt') return val.toFixed(1);
  return String(Math.round(val));
}
function drawChart(hist) {
  const cv = $('chart');
  if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = cv.clientHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);
  const rows = hist.slice(-range);
  chartRows = rows;
  if (rows.length < 2) return;
  const active = METRICS.filter(m => metricState[m.id]);
  const single = active.length === 1 ? active[0] : null;
  const padL = single ? 38 : 6, padR = 6, padT = 10, padB = 22;
  const x = i => padL + (W - padL - padR) * i / (rows.length - 1);
  ctx.strokeStyle = '#221f17'; ctx.lineWidth = 1;
  [0, .25, .5, .75, 1].forEach(f => {
    ctx.beginPath(); ctx.moveTo(padL, padT + (H - padT - padB) * f); ctx.lineTo(W - padR, padT + (H - padT - padB) * f); ctx.stroke();
  });
  ctx.fillStyle = '#8d877a'; ctx.font = '10px -apple-system'; ctx.textAlign = 'center';
  [0, Math.floor((rows.length - 1) / 2), rows.length - 1].forEach(i => ctx.fillText(rows[i].d.slice(5), x(i), H - 7));

  const scales = {};
  for (const m of active) {
    const nums = rows.map(r => r[m.id]).filter(v => v != null);
    if (nums.length < 2) continue;
    let lo = Math.min(...nums), hi = Math.max(...nums);
    if (hi - lo < 1e-9) { hi += 1; lo -= 1; }
    scales[m.id] = { lo, hi };
  }
  // single-metric: real y-axis labels in actual units
  if (single && scales[single.id]) {
    const { lo, hi } = scales[single.id];
    ctx.textAlign = 'right'; ctx.fillStyle = single.color; ctx.font = '600 10px -apple-system';
    [[1, lo], [.5, (lo + hi) / 2], [0, hi]].forEach(([f, val]) =>
      ctx.fillText(fmtV(single.id, val), padL - 5, padT + (H - padT - padB) * f + 3));
    ctx.save(); ctx.translate(10, (H - padB) / 2); ctx.rotate(-Math.PI / 2);
    ctx.textAlign = 'center'; ctx.fillText(single.unit || single.label, 0, 0); ctx.restore();
  }
  for (const m of active) {
    const sc = scales[m.id];
    if (!sc) continue;
    const y = v => padT + (H - padT - padB) * (1 - (v - sc.lo) / (sc.hi - sc.lo));
    ctx.strokeStyle = m.color; ctx.lineWidth = 2; ctx.lineJoin = 'round';
    ctx.beginPath();
    let started = false;
    rows.forEach((r, i) => {
      const v = r[m.id];
      if (v == null) { started = false; return; }
      if (!started) { ctx.moveTo(x(i), y(v)); started = true; } else ctx.lineTo(x(i), y(v));
    });
    ctx.stroke();
  }
  // scrub hairline + dots
  if (scrubIdx != null && rows[scrubIdx]) {
    const xi = x(scrubIdx);
    ctx.strokeStyle = '#8d877a'; ctx.lineWidth = 1; ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(xi, padT); ctx.lineTo(xi, H - padB); ctx.stroke();
    ctx.setLineDash([]);
    for (const m of active) {
      const sc = scales[m.id], v = rows[scrubIdx][m.id];
      if (!sc || v == null) continue;
      const y = padT + (H - padT - padB) * (1 - (v - sc.lo) / (sc.hi - sc.lo));
      ctx.fillStyle = m.color;
      ctx.beginPath(); ctx.arc(xi, y, 4, 0, 7); ctx.fill();
    }
  }
}
function scrubReadout() {
  const el = $('scrub');
  if (!el) return;
  if (scrubIdx == null || !chartRows[scrubIdx]) {
    el.innerHTML = 'touch the chart to inspect a day';
    return;
  }
  const r = chartRows[scrubIdx];
  const parts = METRICS.filter(m => metricState[m.id])
    .map(m => `<span class="dot" style="background:${m.color}"></span><b>${fmtV(m.id, r[m.id])}</b>`);
  el.innerHTML = `<b>${esc(fmtDate(r.d))}</b> &nbsp; ` + parts.join(' &nbsp; ');
}
function bindScrub() {
  const cv = $('chart');
  if (!cv) return;
  const hist = (store.appdata || {}).history || [];
  const toIdx = clientX => {
    const rect = cv.getBoundingClientRect();
    const single = METRICS.filter(m => metricState[m.id]).length === 1;
    const padL = single ? 38 : 6, padR = 6;
    const f = (clientX - rect.left - padL) / (rect.width - padL - padR);
    return Math.max(0, Math.min(chartRows.length - 1, Math.round(f * (chartRows.length - 1))));
  };
  const move = e => {
    const t = e.touches ? e.touches[0] : e;
    scrubIdx = toIdx(t.clientX);
    drawChart(hist); scrubReadout();
    if (e.touches) e.preventDefault();
  };
  cv.addEventListener('touchstart', move, { passive: false });
  cv.addEventListener('touchmove', move, { passive: false });
  cv.addEventListener('mousedown', move);
  cv.addEventListener('mousemove', e => { if (e.buttons) move(e); });
  cv.addEventListener('touchend', () => setTimeout(() => { scrubIdx = null; drawChart(hist); scrubReadout(); }, 1800));
}

/* ---------------- LIFTS ---------------- */
function drawLiftChart(entries) {
  const cv = $('liftchart');
  if (!cv) return;
  const dpr = window.devicePixelRatio || 1;
  const W = cv.clientWidth, H = cv.clientHeight;
  cv.width = W * dpr; cv.height = H * dpr;
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  const pts = entries.filter(e => e.w != null);
  if (pts.length < 2) { ctx.fillStyle = '#8d877a'; ctx.font = '12px -apple-system'; ctx.fillText('Not enough sessions to chart yet', 10, H / 2); return; }
  const padL = 34, padR = 8, padT = 10, padB = 20;
  let lo = Math.min(...pts.map(p => p.w)), hi = Math.max(...pts.map(p => p.w));
  if (hi - lo < 1e-9) { hi += 5; lo -= 5; }
  const x = i => padL + (W - padL - padR) * i / (pts.length - 1);
  const y = v => padT + (H - padT - padB) * (1 - (v - lo) / (hi - lo));
  ctx.strokeStyle = '#221f17';
  [0, .5, 1].forEach(f => { ctx.beginPath(); ctx.moveTo(padL, padT + (H - padT - padB) * f); ctx.lineTo(W - padR, padT + (H - padT - padB) * f); ctx.stroke(); });
  ctx.fillStyle = '#d4a843'; ctx.font = '600 10px -apple-system'; ctx.textAlign = 'right';
  ctx.fillText(String(hi), padL - 5, y(hi) + 3); ctx.fillText(String(lo), padL - 5, y(lo) + 3);
  ctx.strokeStyle = '#d4a843'; ctx.lineWidth = 2;
  ctx.beginPath();
  pts.forEach((p, i) => i ? ctx.lineTo(x(i), y(p.w)) : ctx.moveTo(x(i), y(p.w)));
  ctx.stroke();
  ctx.fillStyle = '#d4a843';
  pts.forEach((p, i) => { ctx.beginPath(); ctx.arc(x(i), y(p.w), 3, 0, 7); ctx.fill(); });
  ctx.fillStyle = '#8d877a'; ctx.font = '10px -apple-system'; ctx.textAlign = 'center';
  [0, pts.length - 1].forEach(i => ctx.fillText(pts[i].d.slice(5), x(i), H - 5));
}
function renderLifts() {
  const ad = store.appdata;
  const v = $('view');
  if (!ad || !ad.lifts_history) { v.innerHTML = '<div class="restcard"><div class="emoji">🏋️</div><h2>No data</h2><p style="color:var(--mut)">Sync in Setup first.</p></div>'; return; }
  const lh = ad.lifts_history;
  if (selLift && lh[selLift]) {
    const entries = lh[selLift];
    const sw = (ad.swaps || {})[norm(selLift)];
    const prog = (ad.progress || []).find(p => p.n === selLift);
    v.innerHTML = `
    <button class="backbtn" id="back">← ALL LIFTS</button>
    <h1 class="big" style="font-size:30px">${esc(selLift.toUpperCase())}</h1>
    <div class="subtitle">${entries.length} SESSIONS LOGGED${prog ? ' · ' + esc(prog.status.toUpperCase()) : ''}</div>
    <div class="card"><canvas id="liftchart"></canvas></div>
    ${sw ? `<div class="tip"><b>Machine taken?</b> Swap for: ${esc(sw)}</div>` : ''}
    <div class="card">` + entries.slice().reverse().map(e => `
      <div class="hrow"><div><div class="nm">${esc(e.d)}</div>${e.note ? `<div class="hnote">${esc(e.note)}</div>` : ''}</div>
      <div class="det">${esc(e.wr)} × ${esc(e.r)}${e.rpe ? ' @' + esc(e.rpe) : ''}</div></div>`).join('') + `</div>`;
    $('back').onclick = () => { selLift = null; renderLifts(); };
    drawLiftChart(entries);
    return;
  }
  // list ordered: program exercises first (current block), then the rest
  const progOrder = (ad.progress || []).map(p => p.n);
  const names = [...new Set([...progOrder, ...Object.keys(lh)])].filter(n => lh[n]);
  v.innerHTML = `
  <div class="eyebrow"><span>LIFTS</span><span class="date">${names.length} EXERCISES</span></div>
  <h1 class="big" style="font-size:34px">LIFT<span class="accent" style="color:var(--gold)">HISTORY</span></h1>
  <div class="subtitle">TAP A LIFT FOR ITS FULL STORY</div>
  <div class="card">` + names.map(n => {
    const e = lh[n][lh[n].length - 1];
    const prog = (ad.progress || []).find(p => p.n === n);
    const inBlock = progOrder.includes(n);
    return `<div class="liftrow" data-lift="${esc(n)}"><div>
      <div class="nm" style="${inBlock ? '' : 'color:var(--mut)'}">${esc(n)}</div>
      <div class="sub">${esc(e.d)} · ${esc(e.wr)} × ${esc(e.r)}${prog ? ` · <span class="st ${prog.cls}" style="font-size:11px">${esc(prog.status)}</span>` : ''}</div>
    </div><div class="arrow">›</div></div>`;
  }).join('') + `</div>
  <div class="scrollhint">GRAYED LIFTS = NOT IN THE CURRENT BLOCK</div>`;
  v.querySelectorAll('[data-lift]').forEach(el => el.onclick = () => { selLift = el.dataset.lift; renderLifts(); });
}

/* ---------------- COACH ---------------- */
function mdLite(s) {
  return esc(s)
    .replace(/^#+ (.+)$/gm, '<b>$1</b>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/^\*(.+)\*$/gm, '<i>$1</i>')
    .split(/\n\n+/).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');
}
function renderCoach() {
  const ad = store.appdata;
  const v = $('view');
  if (!ad) { v.innerHTML = '<div class="restcard"><div class="emoji">🧠</div><h2>No data</h2><p style="color:var(--mut)">Sync in Setup first.</p></div>'; return; }
  const r = ad.readiness || {};
  const c = ad.coach || {};
  const mq = store.msgq;
  v.innerHTML = `
  <div class="eyebrow"><span>COACH</span><span class="date">${esc(ad.block_label || '')}</span></div>
  <h1 class="big" style="font-size:34px">YOUR<span class="accent" style="color:var(--gold)">COACH</span></h1>
  <div class="card verdict"><div class="v ${r.cls}">${esc(r.verdict || '')}</div>
    <div class="adv">${esc(r.advice || '')}</div></div>

  <h3 class="sec">Message the coach</h3>
  <div class="card">
    <textarea class="f msgbox" id="msg" placeholder="Shoulder felt tweaky on presses… / leg press seat is 5 now / can we talk deload?"></textarea>
    <button class="bigbtn" id="sendmsg" style="margin-top:4px">Send</button>
    ${mq.length ? `<div class="msgqueued">📤 ${mq.length} message(s) queued for next sync</div>` : ''}
    <div class="status" id="mstatus">Read at the 7:42 am and 9:06 pm runs · replies appear below</div>
  </div>
  ${c.reply ? `<h3 class="sec">Coach reply</h3><div class="card recap">${mdLite(c.reply)}</div>` : ''}

  <h3 class="sec">Weekly recap ${c.recap_date ? '· ' + esc(c.recap_date) : ''}</h3>
  ${c.recap ? `<div class="card recap">${mdLite(c.recap)}</div>`
            : `<div class="tip">First recap of the new system lands <b>Sunday 7 pm</b>. It covers: what worked, what didn't, and the one change for next week.</div>`}`;
  $('sendmsg').onclick = () => {
    const txt = $('msg').value.trim();
    if (!txt) return;
    const mq2 = store.msgq;
    mq2.push({ id: 'msg|' + Date.now(), date: new Date().toISOString().slice(0, 16).replace('T', ' '), text: txt });
    store.msgq = mq2;
    $('msg').value = '';
    syncAll($('mstatus'));
  };
}

/* ---------------- PLAN ---------------- */
function renderPlan() {
  const ad = store.appdata;
  const v = $('view');
  if (!ad || !ad.sessions) { v.innerHTML = '<div class="restcard"><div class="emoji">🗺️</div><h2>No data</h2><p style="color:var(--mut)">Sync in Setup first.</p></div>'; return; }
  const b = ad.block || {};
  const curWeek = b.start ? Math.floor((new Date(isoToday()) - new Date(b.start + 'T12:00:00')) / 864e5 / 7) + 1 : 0;
  const machineNote = name => {
    const n = norm(name);
    for (const [k, note] of Object.entries(ad.machine_notes || {}))
      if (n.includes(k) || k.includes(n)) return note;
    return '';
  };
  v.innerHTML = `
  <div class="eyebrow"><span>PROGRAM</span><span class="date">WK ${curWeek} OF ${b.weeks || '?'}</span></div>
  <h1 class="big" style="font-size:34px">BLOCK ${b.number || ''}<span class="accent" style="color:var(--gold)">${esc((b.name || '').toUpperCase())}</span></h1>
  <div class="subtitle">${esc(b.start || '')} → ${b.weeks ? esc(addDays(b.start, b.weeks * 7 - 1)) : ''}</div>

  <h3 class="sec">Phases</h3>
  <div class="card">${(ad.phases || []).map(p => {
    const cur = (p.block_weeks || []).includes(curWeek);
    return `<div class="phase ${cur ? 'cur' : ''}"><div class="wk">WK ${p.block_weeks.join('–')}</div>
      <div><div class="nm">${esc(p.phase)}${cur ? ' ←' : ''}</div><div class="nt">RPE cap ${p.rpe_cap} · ${esc(p.note || '')}</div></div></div>`;
  }).join('')}</div>

  <h3 class="sec">The week</h3>
  <div class="card">${WEEKDAYS.map(w => {
    const s = ad.schedule[w];
    return `<div class="hrow"><div class="nm" style="${s === 'REST' ? 'color:var(--mut)' : ''}">${w}</div><div class="det" style="color:${ACCENTS[s] || 'var(--mut)'}">${esc(s)}</div></div>`;
  }).join('')}</div>

  <h3 class="sec">Sessions — tap to expand</h3>
  <div class="card">${Object.entries(ad.sessions).map(([sname, sess]) => `
    <div class="sessacc" data-s="${esc(sname)}">
      <div class="head"><span style="color:${ACCENTS[sname] || 'var(--txt)'}">${esc(sname)}</span>
      <span class="day">${esc(sess.focus || '')} ›</span></div>
      <div class="body">${sess.exercises.map(ex => `
        <div class="pexrow"><b>${esc(ex.name)}</b> <span class="tg2">— ${ex.sets}×${ex.rep_low}–${ex.rep_high}${ex.prefill_weight ? ' @ ' + ex.prefill_weight : ''} · rest ${ex.rest_sec}s</span>
        ${ex.cue ? `<div class="tg2" style="font-style:italic">${esc(ex.cue)}</div>` : ''}
        ${ex.type === 'Machine' && machineNote(ex.name) ? `<div class="mnote">⚙️ ${esc(machineNote(ex.name))}</div>` : ''}
        </div>`).join('')}</div>
    </div>`).join('')}</div>`;
  v.querySelectorAll('.sessacc .head').forEach(h => h.onclick = () => h.parentElement.classList.toggle('open'));
}

/* ---------------- SETTINGS ---------------- */
function renderSettings() {
  const s = LS.k;
  $('view').innerHTML = `
  <div class="eyebrow"><span>SETUP</span></div>
  <h1 class="big" style="font-size:34px">SYNC<span class="accent" style="color:var(--gold)">SETUP</span></h1>
  <div class="card">
    <label class="f">GitHub token (gist scope)</label>
    <input class="f" id="tok" type="password" value="${esc(s.token || '')}" placeholder="github_pat_… / ghp_…">
    <label class="f">Gist ID</label>
    <input class="f" id="gid" value="${esc(s.gist || '')}" placeholder="abc123…">
    <button class="bigbtn" id="saveset">Save & test</button>
    <div class="status" id="sstatus">${store.queue.length + store.msgq.length ? (store.queue.length + store.msgq.length) + ' item(s) queued for upload' : ''}</div>
  </div>
  <div class="tip">Your token is stored <b>only on this phone</b> (localStorage) — never part of the hosted page. Logged sets and messages queue locally and upload when you have signal; your Mac ingests them at 7:42 am and 9:06 pm.</div>
  <div class="tip"><b>Install as app:</b> Safari → Share → Add to Home Screen.</div>`;
  $('saveset').onclick = async () => {
    LS.k = { token: $('tok').value.trim(), gist: $('gid').value.trim() };
    $('sstatus').textContent = 'Testing…';
    try { await pullAppdata(); $('sstatus').textContent = 'Connected ✓ — data loaded'; }
    catch (e) { $('sstatus').textContent = 'Failed: ' + e.message; }
  };
}

document.querySelectorAll('#tabs button').forEach(b => b.onclick = () => { tab = b.dataset.tab; selLift = null; render(); });

/* boot */
if ('serviceWorker' in navigator) { try { navigator.serviceWorker.register('sw.js'); } catch (e) {} }
render();
if (LS.k.token) syncAll(null);
</script>
